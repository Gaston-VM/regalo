<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorpresa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        #giftBtn {
            background: transparent;
            border: none;
            outline: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            cursor: pointer;
            padding: 20px;
            z-index: 10;
            position: relative;
            min-width: 200px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gift {
            font-size: 150px;
            line-height: 1;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
            animation: float 3s ease-in-out infinite;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
            display: block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .gift.shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        .message {
            position: absolute;
            text-align: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            z-index: 20;
            padding: 20px;
        }

        .message.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .message h1 {
            font-size: 5rem;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            text-shadow: none;
            margin-bottom: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .message .subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
        }

        #giftBtn.hide {
            opacity: 0;
            transform: scale(0) rotate(720deg);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .instruction {
            position: absolute;
            bottom: 80px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
            padding: 0 20px;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--color);
            animation: confettiFall var(--fall-duration) ease-out forwards;
            opacity: 0.8;
            top: -20px;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        .heart {
            position: absolute;
            font-size: 24px;
            animation: floatUp 4s ease-out forwards;
            pointer-events: none;
            opacity: 0.8;
            bottom: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1.5);
                opacity: 0;
            }
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.2) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        @media (max-width: 600px) {
            .gift {
                font-size: 120px;
            }
            .message h1 {
                font-size: 3rem;
            }
            .instruction {
                font-size: 1rem;
                bottom: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="glow"></div>

    <button id="giftBtn" ontouchstart="abrirRegalo()" onclick="abrirRegalo()">
        <span class="gift" id="gift">🎁</span>
    </button>

    <div class="message" id="message">
        <h1>Porro Gay</h1>
        <div class="subtitle">¡Sorpresa!</div>
    </div>

    <div class="instruction" id="instruction">Toca el regalo</div>

    <script>
        // Crear estrellas de fondo
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }

        function createConfetti() {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
                    confetti.style.setProperty('--fall-duration', (Math.random() * 2 + 2) + 's');
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        function createHearts() {
            const emojis = ['💖', '💕', '💗', '💝', '💘', '🌈', '✨'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.bottom = '0';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 4000);
                }, i * 200);
            }
        }

        let opened = false;

        function abrirRegalo() {
            if (opened) return;
            opened = true;

            var giftBtn = document.getElementById('giftBtn');
            var gift = document.getElementById('gift');
            var message = document.getElementById('message');
            var instruction = document.getElementById('instruction');

            gift.classList.add('shake');

            setTimeout(function() {
                giftBtn.classList.add('hide');
                instruction.style.display = 'none';

                setTimeout(function() {
                    message.classList.add('show');
                    createConfetti();
                    createHearts();

                    setInterval(function() {
                        if (message.classList.contains('show')) {
                            createConfetti();
                        }
                    }, 3000);
                }, 400);
            }, 500);
        }
    </script>
</body>
</html>
